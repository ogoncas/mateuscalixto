<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Meu Amor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(180deg, #222 0%, #000 100%);
            height: 100vh;
            height: -webkit-fill-available; /* Ajuste para Safari mobile */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Container que simula a tela do celular */
        .mobile-wrapper {
            width: 100%;
            max-width: 400px;
            height: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #b3b3b3;
            padding: 10px 0;
        }

        /* Capa do Álbum Responsiva */
        .album-cover {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }

        .album-cover img {
            width: 85vw;
            height: 85vw;
            max-width: 320px;
            max-height: 320px;
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .album-cover img.playing {
            transform: scale(1.05);
        }

        /* Info da Música */
        .song-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .song-text h1 {
            font-size: 24px;
            margin: 0;
            font-weight: 700;
        }

        .song-text p {
            color: #b3b3b3;
            font-size: 16px;
            margin: 5px 0 0 0;
        }

        .heart-icon {
            font-size: 26px;
            color: #1db954;
        }

        /* Player */
        .progress-container {
            width: 100%;
            margin-bottom: 10px;
        }

        .bar-bg {
            background: #4f4f4f;
            height: 4px;
            width: 100%;
            border-radius: 4px;
            position: relative;
        }

        .bar-fill {
            background: #1db954;
            height: 100%;
            width: 0%;
            border-radius: 4px;
        }

        .time-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #b3b3b3;
            margin-top: 8px;
        }

        /* Controles Mobile-First */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 30px 0;
        }

        .controls i {
            font-size: 24px;
            color: white;
        }

        .play-pause-wrapper {
            background: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .play-pause-wrapper i {
            color: black;
            font-size: 28px;
        }

        .love-quote {
            text-align: center;
            font-size: 14px;
            color: #1db954;
            font-style: italic;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        /* Partículas */
        .heart-particle {
            position: fixed;
            bottom: -10vh;
            font-size: 24px;
            z-index: 100;
            pointer-events: none;
            animation: floatUp 4s linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="mobile-wrapper">
        <div class="header">
            <i class="fas fa-chevron-down"></i>
            <span>Playlist para o meu amor</span>
            <i class="fas fa-ellipsis-vertical"></i>
        </div>

        <div class="album-cover">
            <img src="https://raw.githubusercontent.com/ogoncas/mateuscalixto/refs/heads/main/8b8a4fa4916a39227e8a5453b8015504.jpg" alt="Nossa Foto" id="cover">
        </div>

        <div class="song-details">
            <div class="song-info">
                <div class="song-text">
                    <h1 id="title">Nossa Música</h1>
                    <p id="artist">Para sempre nós dois</p>
                </div>
                <i class="far fa-heart heart-icon" id="like-btn"></i>
            </div>

            <div class="progress-container" id="progress-area">
                <div class="bar-bg">
                    <div class="bar-fill" id="bar-fill"></div>
                </div>
                <div class="time-labels">
                    <span id="current">0:00</span>
                    <span id="total">0:00</span>
                </div>
            </div>

            <div class="controls">
                <i class="fas fa-shuffle" style="color: #1db954; font-size: 18px;"></i>
                <i class="fas fa-backward-step"></i>
                <div class="play-pause-wrapper" id="play-btn">
                    <i class="fas fa-play" id="icon-play"></i>
                </div>
                <i class="fas fa-forward-step"></i>
                <i class="fas fa-repeat" style="font-size: 18px;"></i>
            </div>

            <div class="love-quote">
                "Você é a minha melodia favorita em meio ao silêncio do mundo."
            </div>
        </div>
    </div>

    <audio id="player" src="https://github.com/ogoncas/mateuscalixto/raw/refs/heads/main/Ferrugem%20-%20Interessante%20(Clipe)%20-%20Ferrugem%20(youtube).mp3"></audio>

    <script>
        const player = document.getElementById('player');
        const playBtn = document.getElementById('play-btn');
        const iconPlay = document.getElementById('icon-play');
        const barFill = document.getElementById('bar-fill');
        const cover = document.getElementById('cover');
        const likeBtn = document.getElementById('like-btn');
        
        let isPlaying = false;
        let heartTimer;

        function togglePlay() {
            if (isPlaying) {
                player.pause();
                iconPlay.classList.replace('fa-pause', 'fa-play');
                cover.classList.remove('playing');
                clearInterval(heartTimer);
            } else {
                player.play();
                iconPlay.classList.replace('fa-play', 'fa-pause');
                cover.classList.add('playing');
                heartTimer = setInterval(spawnHeart, 400);
            }
            isPlaying = !isPlaying;
        }

        playBtn.addEventListener('click', togglePlay);

        player.addEventListener('timeupdate', () => {
            const pct = (player.currentTime / player.duration) * 100;
            barFill.style.width = `${pct}%`;
            
            const fmt = (s) => Math.floor(s/60) + ":" + Math.floor(s%60).toString().padStart(2,'0');
            document.getElementById('current').innerText = fmt(player.currentTime);
            if(player.duration) document.getElementById('total').innerText = fmt(player.duration);
        });

        function spawnHeart() {
            const h = document.createElement('div');
            h.classList.add('heart-particle');
            h.innerHTML = ['❤️','💖','✨','💕'][Math.floor(Math.random()*4)];
            h.style.left = Math.random() * 100 + "vw";
            h.style.fontSize = (Math.random() * 10 + 20) + "px";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 4000);
        }

        likeBtn.addEventListener('click', () => {
            likeBtn.classList.toggle('fas');
            likeBtn.classList.toggle('far');
            spawnHeart();
        });

        // Clique na barra de progresso
        document.getElementById('progress-area').addEventListener('click', (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const x = e.clientX - rect.left;
            player.currentTime = (x / rect.width) * player.duration;
        });
    </script>
</body>
</html>
