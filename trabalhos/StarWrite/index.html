<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarWrite ✨ - Escrita Segura</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

    <div id="auth-container" class="modal">
        <div class="modal-content">
            <h2 id="auth-title">StarWrite ✨</h2>
            
            <form id="auth-form">
                <div id="register-fields" style="display:none;">
                    <input type="text" id="user-name" placeholder="Nome de Usuário (Ex: Luke)">
                </div>

                <input type="email" id="email" placeholder="E-mail" required>
                <input type="password" id="password" placeholder="Senha Mestra (Chave de Criptografia)" required>
                
                <p id="auth-error" class="error-msg"></p>

                <div class="auth-buttons">
                    <button type="submit" id="btn-submit">Entrar</button>
                    <button type="button" id="btn-toggle-mode" class="secondary-btn">Não tem conta? Criar uma</button>
                </div>
            </form>

            <div class="auth-info">
                <hr>
                <p><a href="#" id="link-how-it-works">Como funciona a segurança?</a></p>
                <p><a href="#" id="link-terms">Termos de Uso</a></p>
            </div>
        </div>
    </div>

    <main class="container" id="main-content" style="display:none;">
        <header>
            <div class="logo-area">
                <h1>StarWrite ✨</h1>
                <span id="display-username"></span>
            </div>
            <div class="controls">
                <span id="status">Protegido por AES-256</span>
                <button id="btn-logout">Sair</button>
            </div>
        </header>
        
        <div id="editor" contenteditable="true" placeholder="Sua escrita está segura aqui. Nem o administrador do sistema pode ler este conteúdo..."></div>
    </main>

    <div id="info-modal" class="modal" style="display:none;">
        <div class="modal-content info-box">
            <span id="close-info" class="close" aria-label="Fechar">&times;</span>
            <div id="info-text"></div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
