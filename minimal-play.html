<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Play | 0.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root {
            --bg-body: #050507;
            --accent: #a29bfe;
            --accent-glow: rgba(162, 155, 254, 0.4);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --card-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.1);
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Reset e Base */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background-color: var(--bg-body);
            font-family: var(--font-family);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Background Dinâmico */
        #dynamic-bg {
            position: fixed;
            top: -10%; left: -10%;
            width: 120%; height: 120%;
            background-size: cover;
            background-position: center;
            filter: blur(100px) brightness(0.2) saturate(1.5);
            z-index: -1;
            transition: background-image 1.5s ease;
        }

        /* Container Principal - Mobile First */
        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1200px;
            height: auto;
            min-height: 100vh;
            gap: 20px;
            padding: 20px;
            z-index: 1;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilo Desktop (Telas > 900px) */
        @media (min-width: 900px) {
            .app-container {
                flex-direction: row;
                height: 85vh;
                min-height: 600px;
                padding: 0;
                width: 95%;
            }
            body { overflow: hidden; }
        }

        /* --- PLAYER CARD --- */
        .player-card {
            flex: 1.4;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.01));
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border: 1px solid var(--border-glass);
            border-radius: 30px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
        }

        @media (min-width: 900px) {
            .player-card { border-radius: 40px; padding: 50px; }
        }

        .art-viewport {
            width: 80%;
            max-width: 300px;
            aspect-ratio: 1/1;
            border-radius: 25px;
            overflow: hidden;
            background: #111;
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transition: var(--transition);
        }

        .playing .art-viewport {
            transform: scale(1.05);
            box-shadow: 0 25px 50px var(--accent-glow);
        }

        #art-image { width: 100%; height: 100%; object-fit: cover; transition: 0.5s ease; }

        .song-info { text-align: center; width: 100%; margin: 20px 0; }
        .song-info h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
        .song-info p { color: var(--accent); font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }

        @media (min-width: 900px) {
            .song-info h1 { font-size: 2.2rem; }
        }

        /* Barra de Progresso */
        .progress-section { width: 100%; margin-bottom: 20px; }
        #progress {
            width: 100%; height: 6px; appearance: none;
            background: rgba(255,255,255,0.1); border-radius: 10px;
            cursor: pointer;
        }
        #progress::-webkit-slider-thumb {
            appearance: none; width: 18px; height: 18px;
            background: #fff; border-radius: 50%; box-shadow: 0 0 15px var(--accent-glow);
        }

        .time-stamps { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-dim); margin-top: 10px; }

        /* Controles */
        .controls { display: flex; align-items: center; gap: 25px; }
        .btn { background: none; border: none; color: #fff; cursor: pointer; transition: var(--transition); opacity: 0.7; }
        .btn:hover { opacity: 1; transform: scale(1.1); }
        .btn:active { transform: scale(0.9); }
        
        .btn-play { 
            width: 75px; height: 75px; border-radius: 50%; 
            background: #fff; color: #000;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- PLAYLIST PANEL --- */
        .playlist-panel {
            flex: 0.8;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid var(--border-glass);
            display: flex; flex-direction: column;
            transition: var(--transition);
        }

        .playlist-panel.edit-mode-active {
            border: 1px solid var(--accent);
            box-shadow: 0 0 20px rgba(162, 155, 254, 0.2);
        }

        @media (min-width: 900px) {
            .playlist-panel { border-radius: 40px; padding: 35px; }
        }

        .songs-list { flex: 1; overflow-y: auto; margin-top: 20px; padding-right: 5px; }
        .song-item {
            padding: 16px; border-radius: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 10px; transition: 0.3s;
            border: 1px solid transparent;
            background: rgba(255,255,255,0.02);
        }
        .song-item:hover { background: rgba(255,255,255,0.05); }
        .song-item:active { transform: scale(0.98); }
        .song-item.active { background: rgba(162, 155, 254, 0.1); border: 1px solid rgba(162, 155, 254, 0.2); }

        .song-actions { display: flex; gap: 10px; }
        .btn-del { background: none; border: none; color: rgba(255,255,255,0.2); cursor: pointer; padding: 8px; transition: 0.2s; }
        .btn-del:hover { color: #ff7675; }

        /* Botões de Cabeçalho da Playlist */
        #toggleEdit {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-glass);
            color: var(--text-dim);
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }
        #toggleEdit.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content {
            background: #111; padding: 30px; border-radius: 30px;
            width: 90%; max-width: 400px; border: 1px solid var(--border-glass);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        .modal-content input[type="text"] {
            width: 100%; padding: 14px; margin-bottom: 12px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass);
            border-radius: 12px; color: #fff;
        }

        /* Drag and Drop area */
        .drop-active { border: 2px dashed var(--accent) !important; background: rgba(162,155,254,0.1) !important; }

        /* Custom Scrollbar */
        .songs-list::-webkit-scrollbar { width: 4px; }
        .songs-list::-webkit-scrollbar-thumb { background: var(--border-glass); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>

    <div class="app-container" id="app-box">
        <main class="player-card" id="playerMain">
            <div class="art-viewport">
                <img id="art-image" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Capa">
            </div>

            <div class="song-info">
                <h1 id="title">Minimal Play</h1>
                <p id="artist">Selecione uma música</p>
            </div>

            <div class="progress-section">
                <input type="range" id="progress" value="0">
                <div class="time-stamps">
                    <span id="current">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-secondary" id="prev"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button class="btn btn-play" id="play"><svg width="35" height="35" viewBox="0 0 24 24" fill="currentColor" id="play-icon"><path d="M8 5v14l11-7z"/></svg></button>
                <button class="btn btn-secondary" id="next"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
            </div>

            <div style="margin-top: 25px; display: flex; align-items: center; gap: 15px; opacity: 0.6; width: 100%; max-width: 200px;">
                <svg width="18" height="18" fill="white" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
                <input type="range" id="volume" min="0" max="1" step="0.05" value="0.8" style="flex: 1; accent-color: var(--accent);">
            </div>
        </main>

        <aside class="playlist-panel" id="playlistPanel">
            <header style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="font-size: 0.7rem; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase;">Biblioteca</h3>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button id="toggleEdit">Editar: Off</button>
                    <label for="upload" style="cursor: pointer; color: #000; background: var(--accent); font-size: 0.65rem; font-weight: 800; padding: 8px 14px; border-radius: 12px;">+ ADD</label>
                </div>
                <input type="file" id="upload" multiple accept="audio/*" style="display:none">
            </header>
            <div class="songs-list" id="list"></div>
        </aside>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px; text-align: center; font-weight: 800;">Editar Música</h2>
            <div style="text-align: center; margin-bottom: 20px;">
                <label for="editCoverInput" style="cursor: pointer; position: relative; display: inline-block;">
                    <img id="editCoverPreview" src="" style="width: 130px; height: 130px; border-radius: 20px; object-fit: cover; border: 2px solid var(--accent);">
                    <div style="position: absolute; bottom: 5px; right: 5px; background: var(--accent); border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; color: #000; font-size: 14px;">✎</div>
                </label>
                <input type="file" id="editCoverInput" accept="image/*" style="display: none;">
            </div>
            <input type="text" id="editTitle" placeholder="Título">
            <input type="text" id="editArtist" placeholder="Artista">
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button onclick="closeModal()" style="flex: 1; padding: 14px; border-radius: 12px; border: none; background: rgba(255,255,255,0.05); color: #fff; cursor: pointer;">Cancelar</button>
                <button id="saveEditBtn" style="flex: 1; padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: #000; font-weight: 800; cursor: pointer;">Salvar</button>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const dbName = "MinimalPlayDB";
        const audio = document.getElementById('audio');
        const listDiv = document.getElementById('list');
        const playBtn = document.getElementById('play');
        const playIcon = document.getElementById('play-icon');
        const toggleEditBtn = document.getElementById('toggleEdit');
        const playlistPanel = document.getElementById('playlistPanel');
        const appBox = document.getElementById('app-box');
        
        let songs = [];
        let currentIndex = 0;
        let isEditMode = false;
        let editingSongId = null;
        let currentEditCoverBase64 = null;

        // --- IndexedDB ---
        const dbRequest = indexedDB.open(dbName, 1);
        dbRequest.onupgradeneeded = (e) => {
            e.target.result.createObjectStore("library", { keyPath: "id", autoIncrement: true });
        };
        dbRequest.onsuccess = () => loadFromDB();

        async function saveToDB(file) {
            const tags = await new Promise(res => {
                window.jsmediatags.read(file, { onSuccess: t => res(t.tags), onError: () => res({}) });
            });

            let cover = null;
            if (tags.picture) {
                const { data, format } = tags.picture;
                let base64 = "";
                for (let i = 0; i < data.length; i++) base64 += String.fromCharCode(data[i]);
                cover = `data:${format};base64,${window.btoa(base64)}`;
            }

            const songData = {
                file: file,
                title: tags.title || file.name.replace(/\.[^/.]+$/, ""),
                artist: tags.artist || "Artista Desconhecido",
                cover: cover
            };

            const store = dbRequest.result.transaction("library", "readwrite").objectStore("library");
            store.add(songData).onsuccess = () => loadFromDB();
        }

        function loadFromDB() {
            const store = dbRequest.result.transaction("library", "readonly").objectStore("library");
            store.getAll().onsuccess = (e) => {
                songs = e.target.result.map(s => ({ ...s, url: URL.createObjectURL(s.file) }));
                render();
                if (songs.length > 0 && !audio.src) loadSong(0, false);
                else if (songs.length > 0) updateDisplay();
            };
        }

        function removeSong(id, e) {
            e.stopPropagation();
            dbRequest.result.transaction("library", "readwrite").objectStore("library").delete(id).onsuccess = () => loadFromDB();
        }

        // --- Core Player Logic ---
        function render() {
            listDiv.innerHTML = songs.map((s, i) => `
                <div class="song-item ${i === currentIndex ? 'active' : ''}" onclick="handleSongClick(${i}, ${s.id}, event)">
                    <div style="overflow:hidden; flex: 1;">
                        <h4 style="white-space:nowrap; text-overflow:ellipsis; overflow:hidden; font-size: 0.9rem;">${s.title}</h4>
                        <p style="font-size:0.7rem; opacity:0.5; margin-top:2px;">${s.artist}</p>
                    </div>
                    <div class="song-actions">
                        <button class="btn-del" onclick="removeSong(${s.id}, event)">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function handleSongClick(idx, id, e) {
            if (isEditMode) openEditModal(id, e);
            else loadSong(idx);
        }

        function loadSong(idx, autoPlay = true) {
            if (!songs[idx]) return;
            currentIndex = idx;
            audio.src = songs[idx].url;
            updateDisplay();
            if (autoPlay) togglePlay(true);
        }

        function updateDisplay() {
            const s = songs[currentIndex];
            if (!s) return;

            document.getElementById('title').innerText = s.title;
            document.getElementById('artist').innerText = s.artist;
            const cover = s.cover || 'https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=500';
            document.getElementById('art-image').src = cover;
            document.getElementById('dynamic-bg').style.backgroundImage = `url(${cover})`;

            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: s.title, artist: s.artist, album: 'Minimal Play',
                    artwork: [{ src: cover, sizes: '512x512', type: 'image/png' }]
                });
            }
            render();
        }

        function togglePlay(forcePlay = null) {
            const shouldPlay = forcePlay !== null ? forcePlay : audio.paused;
            if (shouldPlay) {
                audio.play();
                playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                document.getElementById('playerMain').classList.add('playing');
            } else {
                audio.pause();
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                document.getElementById('playerMain').classList.remove('playing');
            }
        }

        // --- Eventos e Controles ---
        playBtn.onclick = () => togglePlay();
        document.getElementById('next').onclick = () => loadSong((currentIndex + 1) % songs.length);
        document.getElementById('prev').onclick = () => loadSong((currentIndex - 1 + songs.length) % songs.length);
        document.getElementById('upload').onchange = (e) => Array.from(e.target.files).forEach(saveToDB);
        
        audio.ontimeupdate = () => {
            const prog = document.getElementById('progress');
            prog.value = (audio.currentTime / audio.duration) * 100 || 0;
            document.getElementById('current').innerText = fmt(audio.currentTime);
            document.getElementById('duration').innerText = fmt(audio.duration);
        };
        
        document.getElementById('progress').oninput = (e) => audio.currentTime = (e.target.value / 100) * audio.duration;
        document.getElementById('volume').oninput = (e) => audio.volume = e.target.value;
        audio.onended = () => document.getElementById('next').click();

        // --- Modo de Edição ---
        toggleEditBtn.onclick = () => {
            isEditMode = !isEditMode;
            toggleEditBtn.innerText = isEditMode ? "Editar: On" : "Editar: Off";
            toggleEditBtn.classList.toggle('active', isEditMode);
            playlistPanel.classList.toggle('edit-mode-active', isEditMode);
        };

        function openEditModal(id, e) {
            e.stopPropagation();
            const song = songs.find(s => s.id === id);
            editingSongId = id;
            document.getElementById('editTitle').value = song.title;
            document.getElementById('editArtist').value = song.artist;
            currentEditCoverBase64 = song.cover;
            document.getElementById('editCoverPreview').src = song.cover || 'https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=500';
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('editModal').style.display = 'none'; }

        document.getElementById('editCoverInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentEditCoverBase64 = ev.target.result;
                    document.getElementById('editCoverPreview').src = ev.target.result;
                };
                reader.readAsDataURL(file);
            }
        };

        document.getElementById('saveEditBtn').onclick = () => {
            const store = dbRequest.result.transaction("library", "readwrite").objectStore("library");
            store.get(editingSongId).onsuccess = (e) => {
                const data = e.target.result;
                data.title = document.getElementById('editTitle').value;
                data.artist = document.getElementById('editArtist').value;
                data.cover = currentEditCoverBase64;
                store.put(data).onsuccess = () => { closeModal(); loadFromDB(); };
            };
        };

        // --- Drag & Drop ---
        window.ondragover = (e) => { e.preventDefault(); appBox.classList.add('drop-active'); };
        window.ondragleave = () => appBox.classList.remove('drop-active');
        window.ondrop = (e) => {
            e.preventDefault();
            appBox.classList.remove('drop-active');
            Array.from(e.dataTransfer.files).forEach(saveToDB);
        };

        const fmt = s => isNaN(s) ? "0:00" : Math.floor(s/60) + ":" + String(Math.floor(s%60)).padStart(2, '0');
        window.onkeydown = (e) => { if(e.code === "Space") { e.preventDefault(); togglePlay(); } };
    </script>
</body>
</html>
