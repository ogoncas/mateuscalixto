<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Play</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="icon" href="favicon_minimal-play.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Minimal Play">
    
    <style>
        :root {
            --bg-body: #050507;
            --accent: #a29bfe;
            --accent-glow: rgba(162, 155, 254, 0.4);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --card-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.1);
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            --danger: #ff7675;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background-color: var(--bg-body);
            font-family: var(--font-family);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 20px 0;
        }

        #dynamic-bg {
            position: fixed;
            top: -10%; left: -10%;
            width: 120%; height: 120%;
            background-size: cover;
            background-position: center;
            filter: blur(100px) brightness(0.2) saturate(1.5);
            z-index: -1;
            transition: background-image 1.5s ease;
        }

        .app-container {
            display: flex;
            width: 95%;
            max-width: 1200px;
            min-height: 85vh;
            gap: 30px;
            z-index: 1;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* --- PLAYER CARD --- */
        .player-card {
            flex: 1.4;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.01));
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border: 1px solid var(--border-glass);
            border-radius: 40px;
            padding: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.6);
        }

        .art-viewport {
            width: 100%;
            max-width: 320px;
            aspect-ratio: 1/1;
            border-radius: 30px;
            overflow: hidden;
            background: #111;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            transition: var(--transition);
        }

        .playing .art-viewport {
            transform: scale(1.05);
            box-shadow: 0 25px 50px var(--accent-glow);
        }

        #art-image { width: 100%; height: 100%; object-fit: cover; transition: 0.5s ease; }

        .song-info { text-align: center; width: 100%; margin: 25px 0; }
        .song-info h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
        .song-info p { color: var(--accent); font-size: 1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; opacity: 0.9; }

        .progress-section { width: 100%; margin-bottom: 20px; }
        #progress {
            width: 100%; height: 6px; appearance: none;
            background: rgba(255,255,255,0.1); border-radius: 10px;
            cursor: pointer; transition: 0.2s;
        }
        #progress::-webkit-slider-thumb {
            appearance: none; width: 16px; height: 16px;
            background: #fff; border-radius: 50%; box-shadow: 0 0 15px var(--accent-glow);
        }

        .time-stamps { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-dim); margin-top: 12px; }

        .controls { display: flex; align-items: center; gap: 25px; }
        .btn { background: none; border: none; color: #fff; cursor: pointer; transition: var(--transition); opacity: 0.7; }
        .btn:hover { opacity: 1; transform: scale(1.1); }
        .btn.active { color: var(--accent); opacity: 1; }
        
        .btn-play { 
            width: 85px; height: 85px; border-radius: 50%; 
            background: #fff; color: #000;
            display: flex; align-items: center; justify-content: center;
        }

        /* PLAYLIST PANEL */
        .playlist-panel {
            flex: 0.8;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 40px;
            padding: 35px;
            border: 1px solid var(--border-glass);
            display: flex; flex-direction: column;
            transition: var(--transition);
        }

        .playlist-panel.edit-mode-active {
            border: 1px solid var(--accent);
            box-shadow: 0 0 20px rgba(162, 155, 254, 0.2);
            animation: pulse-border 2s infinite linear;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0px rgba(162, 155, 254, 0.2); }
            50% { box-shadow: 0 0 25px rgba(162, 155, 254, 0.4); }
            100% { box-shadow: 0 0 0px rgba(162, 155, 254, 0.2); }
        }

        .search-container {
            margin: 20px 0 10px 0;
            position: relative;
        }
        #searchBar {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-glass);
            border-radius: 15px;
            color: #fff;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        #searchBar:focus {
            border-color: var(--accent);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 15px rgba(162, 155, 254, 0.1);
        }

        .songs-list { flex: 1; overflow-y: auto; margin-top: 15px; max-height: 500px; }
        .song-item {
            padding: 15px; border-radius: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 10px; transition: 0.3s;
            border: 1px solid transparent;
        }
        .song-item:hover { background: rgba(255,255,255,0.05); }
        .song-item.active { background: rgba(162, 155, 254, 0.1); border: 1px solid rgba(162, 155, 254, 0.2); }

        .edit-mode-active .song-item:hover {
            border-color: var(--accent);
            background: rgba(162, 155, 254, 0.1);
        }

        #toggleEdit {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-glass);
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #toggleEdit.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content {
            background: #111; padding: 40px; border-radius: 35px;
            width: 90%; max-width: 420px; border: 1px solid var(--border-glass);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        .modal-content h2 { margin-bottom: 25px; font-weight: 800; text-align: center; }
        .modal-content input[type="text"] {
            width: 100%; padding: 15px; margin-bottom: 15px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass);
            border-radius: 12px; color: #fff; font-size: 1rem;
        }
        .modal-buttons { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        .btn-save { flex: 1; background: var(--accent); color: #000; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; }
        .btn-cancel { flex: 1; background: rgba(255,255,255,0.05); color: #fff; padding: 15px; border-radius: 12px; border: none; cursor: pointer; }
        
        .btn-modal-del {
            background: rgba(255, 118, 117, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 12px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.75rem;
            cursor: pointer;
            letter-spacing: 1px;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-modal-del:hover { background: var(--danger); color: #000; }

        .drop-active { border: 2px dashed var(--accent) !important; background: rgba(162,155,254,0.1) !important; }

        @media (max-width: 900px) {
            body { align-items: flex-start; padding-top: 20px; }
            .app-container { flex-direction: column; height: auto; min-height: 100vh; overflow-y: visible; margin-bottom: 50px; }
            .player-card, .playlist-panel { flex: none; width: 100%; padding: 30px; }
            .songs-list { max-height: 400px; }
        }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>

    <div class="app-container" id="app-box">
        <main class="player-card" id="playerMain">
            <div class="art-viewport">
                <img id="art-image" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Cover">
            </div>

            <div class="song-info">
                <h1 id="title">Minimal Play</h1>
                <p id="artist">Select a song</p>
            </div>

            <div class="progress-section">
                <input type="range" id="progress" value="0">
                <div class="time-stamps">
                    <span id="current">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="btn" id="shuffle" title="Shuffle Mode">
                    <i class="fas fa-shuffle" style="font-size: 1.2rem;"></i>
                </button>
                <button class="btn" id="prev">
                    <i class="fas fa-backward-step" style="font-size: 1.2rem;"></i>
                </button>
                <button class="btn btn-play" id="play">
                    <i class="fas fa-play" id="play-icon" style="font-size: 2rem; margin-left: 5px;"></i>
                </button>
                <button class="btn" id="next">
                    <i class="fas fa-forward-step" style="font-size: 1.2rem;"></i>
                </button>
            </div>

            <div style="margin-top: 25px; display: flex; align-items: center; gap: 15px; opacity: 0.6; width: 100%; max-width: 200px;">
                <i class="fas fa-volume-high" style="color: white; font-size: 0.9rem;"></i>
                <input type="range" id="volume" min="0" max="1" step="0.05" value="0.8" style="flex: 1; accent-color: var(--accent);">
            </div>
        </main>

        <aside class="playlist-panel" id="playlistPanel">
            <header style="display: flex; justify-content: space-between; align-items: center; gap: 10px;">
                <h3 style="font-size: 0.7rem; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase;">Library</h3>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <button id="toggleEdit">Edit: Off</button>
                    <label for="upload" style="cursor: pointer; color: var(--accent); font-size: 0.7rem; font-weight: 800; background: rgba(162, 155, 254, 0.1); padding: 8px 12px; border-radius: 12px;">
                        <i class="fas fa-plus"></i> ADD
                    </label>
                </div>
                <input type="file" id="upload" multiple accept="audio/*" style="display:none">
            </header>

            <div class="search-container">
                <input type="text" id="searchBar" placeholder="Search songs or artists...">
            </div>

            <div class="songs-list" id="list"></div>
        </aside>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <h2>Edit Track Info</h2>
            <div style="text-align: center; margin-bottom: 25px;">
                <label for="editCoverInput" style="cursor: pointer; position: relative; display: inline-block;">
                    <img id="editCoverPreview" src="" style="width: 140px; height: 140px; border-radius: 20px; object-fit: cover; border: 2px solid var(--accent);">
                    <div style="position: absolute; bottom: 5px; right: 5px; background: var(--accent); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: #000; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
                        <i class="fas fa-pen"></i>
                    </div>
                </label>
                <input type="file" id="editCoverInput" accept="image/*" style="display: none;">
            </div>
            <input type="text" id="editTitle" placeholder="Title">
            <input type="text" id="editArtist" placeholder="Artist">
            <div class="modal-buttons">
                <div style="display: flex; gap: 12px; width: 100%;">
                    <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button class="btn-save" id="saveEditBtn">Save Changes</button>
                </div>
                <button class="btn-modal-del" id="modalDeleteBtn">
                    <i class="fas fa-trash-can" style="margin-right: 5px;"></i> DELETE FROM LIBRARY
                </button>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const dbName = "MinimalPlayDB";
        const audio = document.getElementById('audio');
        const listDiv = document.getElementById('list');
        const searchBar = document.getElementById('searchBar');
        const shuffleBtn = document.getElementById('shuffle');
        const playlistPanel = document.getElementById('playlistPanel');
        const playBtn = document.getElementById('play');
        const playIcon = document.getElementById('play-icon');
        const appBox = document.getElementById('app-box');
        const toggleEditBtn = document.getElementById('toggleEdit');
        
        let songs = [];
        let originalOrder = [];
        let currentIndex = 0;
        let editingSongId = null;
        let currentEditCoverBase64 = null;
        let isEditMode = false;
        let isShuffle = false;

        // --- DATABASE ---
        const dbRequest = indexedDB.open(dbName, 1);
        dbRequest.onupgradeneeded = (e) => {
            e.target.result.createObjectStore("library", { keyPath: "id", autoIncrement: true });
        };
        dbRequest.onsuccess = () => loadFromDB();

        async function saveToDB(file) {
            const tags = await new Promise(res => {
                window.jsmediatags.read(file, { onSuccess: t => res(t.tags), onError: () => res({}) });
            });

            let cover = null;
            if (tags.picture) {
                const { data, format } = tags.picture;
                let base64 = "";
                for (let i = 0; i < data.length; i++) base64 += String.fromCharCode(data[i]);
                cover = `data:${format};base64,${window.btoa(base64)}`;
            }

            const songData = {
                file: file,
                title: tags.title || file.name.replace(/\.[^/.]+$/, ""),
                artist: tags.artist || "Unknown Artist",
                cover: cover
            };

            const store = dbRequest.result.transaction("library", "readwrite").objectStore("library");
            store.add(songData).onsuccess = () => loadFromDB();
        }

        function loadFromDB() {
            const store = dbRequest.result.transaction("library", "readonly").objectStore("library");
            store.getAll().onsuccess = (e) => {
                const data = e.target.result.map(s => ({ ...s, url: URL.createObjectURL(s.file) }));
                originalOrder = [...data];
                
                if (isShuffle) {
                    applyShuffleLogic();
                } else {
                    songs = [...originalOrder];
                }
                
                render();
                if (songs.length > 0 && !audio.src) loadSong(0, false);
                else if (songs.length > 0) updateCurrentDisplay();
            };
        }

        // --- SEARCH & SHUFFLE ---
        searchBar.oninput = (e) => render(e.target.value);

        shuffleBtn.onclick = () => {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('active', isShuffle);
            
            if (isShuffle && songs.length > 0) {
                applyShuffleLogic();
            } else {
                const currentId = songs[currentIndex]?.id;
                songs = [...originalOrder];
                currentIndex = songs.findIndex(s => s.id === currentId);
            }
            render(searchBar.value);
        };

        function applyShuffleLogic() {
            if (songs.length === 0) return;
            const currentSong = songs[currentIndex];
            let pool = [...originalOrder];
            
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }
            
            songs = pool;
            if (currentSong) {
                currentIndex = songs.findIndex(s => s.id === currentSong.id);
            }
        }

        // --- TOGGLE MODE ---
        toggleEditBtn.onclick = () => {
            isEditMode = !isEditMode;
            toggleEditBtn.innerText = isEditMode ? "Edit: On" : "Edit: Off";
            toggleEditBtn.classList.toggle('active', isEditMode);
            playlistPanel.classList.toggle('edit-mode-active', isEditMode);
        };

        // --- PLAYER ---
        function handleSongClick(idx, id, e) {
            if (isEditMode) {
                openEditModal(id, e);
            } else {
                loadSong(idx);
            }
        }

        function loadSong(idx, autoPlay = true) {
            if (!songs[idx]) return;
            currentIndex = idx;
            updateCurrentDisplay();
            audio.src = songs[idx].url;
            if (autoPlay) togglePlay(true);
        }

        function updateCurrentDisplay() {
            const s = songs[currentIndex];
            if (!s) return;

            document.getElementById('title').innerText = s.title;
            document.getElementById('artist').innerText = s.artist;
            
            const cover = s.cover || 'https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=500';
            document.getElementById('art-image').src = cover;
            document.getElementById('dynamic-bg').style.backgroundImage = `url(${cover})`;

            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: s.title,
                    artist: s.artist,
                    album: 'Minimal Play',
                    artwork: [{ src: cover, sizes: '512x512', type: 'image/png' }]
                });
                updateMediaSessionActionHandlers();
            }
            render(searchBar.value);
        }

        function updateMediaSessionActionHandlers() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', () => togglePlay(true));
                navigator.mediaSession.setActionHandler('pause', () => togglePlay(false));
                navigator.mediaSession.setActionHandler('previoustrack', () => document.getElementById('prev').click());
                navigator.mediaSession.setActionHandler('nexttrack', () => document.getElementById('next').click());
                navigator.mediaSession.setActionHandler('seekto', (details) => {
                    if (details.seekTime && !isNaN(audio.duration)) {
                        audio.currentTime = details.seekTime;
                    }
                });
            }
        }

        function togglePlay(forcePlay = null) {
            const shouldPlay = forcePlay !== null ? forcePlay : audio.paused;
            if (shouldPlay) {
                audio.play();
                playIcon.className = "fas fa-pause";
                playIcon.style.marginLeft = "0";
                document.getElementById('playerMain').classList.add('playing');
                if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "playing";
            } else {
                audio.pause();
                playIcon.className = "fas fa-play";
                playIcon.style.marginLeft = "5px";
                document.getElementById('playerMain').classList.remove('playing');
                if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "paused";
            }
        }

        function render(filter = "") {
            const term = filter.toLowerCase();
            const filteredData = songs.filter(s => 
                s.title.toLowerCase().includes(term) || 
                s.artist.toLowerCase().includes(term)
            );

            listDiv.innerHTML = filteredData.map((s) => {
                const actualIdx = songs.findIndex(item => item.id === s.id);
                return `
                <div class="song-item ${actualIdx === currentIndex ? 'active' : ''}" onclick="handleSongClick(${actualIdx}, ${s.id}, event)">
                    <div style="overflow:hidden; flex: 1;">
                        <h4 style="white-space:nowrap; text-overflow:ellipsis; overflow:hidden; font-size: 0.95rem;">${s.title}</h4>
                        <p style="font-size:0.75rem; opacity:0.6; margin-top: 2px;">${s.artist}</p>
                    </div>
                </div>
            `}).join('');
        }

        function openEditModal(id, e) {
            if(e) e.stopPropagation();
            const song = songs.find(s => s.id === id);
            if (!song) return;
            editingSongId = id;
            document.getElementById('editTitle').value = song.title;
            document.getElementById('editArtist').value = song.artist;
            currentEditCoverBase64 = song.cover;
            document.getElementById('editCoverPreview').src = song.cover || 'https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=500';
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
            editingSongId = null;
        }

        document.getElementById('editCoverInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentEditCoverBase64 = ev.target.result;
                    document.getElementById('editCoverPreview').src = currentEditCoverBase64;
                };
                reader.readAsDataURL(file);
            }
        };

        document.getElementById('saveEditBtn').onclick = () => {
            if (!editingSongId) return;
            const transaction = dbRequest.result.transaction("library", "readwrite");
            const store = transaction.objectStore("library");
            store.get(editingSongId).onsuccess = (e) => {
                const data = e.target.result;
                data.title = document.getElementById('editTitle').value;
                data.artist = document.getElementById('editArtist').value;
                data.cover = currentEditCoverBase64;
                store.put(data).onsuccess = () => {
                    closeModal();
                    loadFromDB();
                };
            };
        };

        // NEW: Modal Delete logic
        document.getElementById('modalDeleteBtn').onclick = () => {
            if (!editingSongId) return;
            if (confirm("Permanently remove this song from your library?")) {
                dbRequest.result.transaction("library", "readwrite").objectStore("library").delete(editingSongId).onsuccess = () => {
                    closeModal();
                    loadFromDB();
                };
            }
        };

        playBtn.onclick = () => togglePlay();
        document.getElementById('next').onclick = () => loadSong((currentIndex + 1) % songs.length);
        document.getElementById('prev').onclick = () => loadSong((currentIndex - 1 + songs.length) % songs.length);
        document.getElementById('upload').onchange = (e) => Array.from(e.target.files).forEach(saveToDB);
        
        audio.ontimeupdate = () => {
            const progress = document.getElementById('progress');
            const currentTime = audio.currentTime;
            const duration = audio.duration;
            
            progress.value = (currentTime / duration) * 100 || 0;
            document.getElementById('current').innerText = fmt(currentTime);
            document.getElementById('duration').innerText = fmt(duration);

            if ('mediaSession' in navigator && !isNaN(duration)) {
                navigator.mediaSession.setPositionState({
                    duration: duration,
                    playbackRate: audio.playbackRate,
                    position: currentTime
                });
            }
        };
        
        document.getElementById('progress').oninput = (e) => audio.currentTime = (e.target.value / 100) * audio.duration;
        document.getElementById('volume').oninput = (e) => audio.volume = e.target.value;
        audio.onended = () => document.getElementById('next').click();

        window.ondragover = (e) => { e.preventDefault(); appBox.classList.add('drop-active'); };
        window.ondragleave = () => appBox.classList.remove('drop-active');
        window.ondrop = (e) => {
            e.preventDefault();
            appBox.classList.remove('drop-active');
            Array.from(e.dataTransfer.files).forEach(saveToDB);
        };

        const fmt = s => isNaN(s) ? "0:00" : Math.floor(s/60) + ":" + String(Math.floor(s%60)).padStart(2, '0');
        
        window.onkeydown = (e) => { 
            if(e.code === "Space") { 
                if(document.activeElement.tagName !== 'INPUT') {
                    e.preventDefault(); 
                    togglePlay(); 
                }
            } 
        };
    </script>
</body>
</html>
