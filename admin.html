<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | Mateus Calixto</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.png" type="image/png">

    <style>
        .admin-wrapper { max-width: 800px; margin: 40px auto; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        label { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; color: #333; }
        input, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 1rem; }
        textarea { resize: vertical; min-height: 150px; }
        
        .btn-block { padding: 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 1rem; transition: 0.2s; }
        .btn-primary { background: #000; color: #fff; }
        .btn-primary:hover { background: #333; }
        
        .posts-list { margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px; }
        .post-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #f5f5f5; }
        .post-info h4 { margin: 0; font-family: 'Playfair Display', serif; }
        .post-actions button { margin-left: 10px; padding: 5px 10px; cursor: pointer; border: 1px solid #ddd; background: #fff; border-radius: 4px; font-size: 0.8rem; }
        .btn-delete { color: red; border-color: #ffcccc !important; }

        /* Overlay de carregamento para a verificação de segurança */
        #loading-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background:#fff;
            display:flex; align-items:center; justify-content:center; z-index:9999;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">Verificando permissões...</div>

    <header class="site-header">
        <div class="container">
            <div class="brand">
                <h1>Painel Admin</h1>
                <a href="index.html" style="text-decoration:none; color:#666; font-size:0.9rem;">← Voltar para o Site</a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="admin-wrapper">
            <h2 style="margin-bottom: 25px; font-family: 'Playfair Display', serif;">Gerenciar Notícias</h2>
            
            <form id="post-form">
                <input type="hidden" id="edit-id">
                
                <div class="form-group">
                    <label for="titulo">Título da Notícia</label>
                    <input type="text" id="titulo" placeholder="Ex: As novas tendências da economia" required>
                </div>

                <div class="form-group">
                    <label for="resumo">Resumo (Chamada na Home)</label>
                    <input type="text" id="resumo" placeholder="Um breve resumo para atrair o leitor" required>
                </div>

                <div class="form-group">
                    <label for="imagem">URL da Imagem</label>
                    <input type="url" id="imagem" placeholder="https://link-da-imagem.jpg">
                </div>

                <div class="form-group">
                    <label for="conteudo">Conteúdo Completo (HTML aceito)</label>
                    <textarea id="conteudo" placeholder="Escreva o corpo da notícia aqui..." required></textarea>
                </div>

                <button type="submit" id="submit-btn" class="btn-block btn-primary">Publicar Notícia</button>
                <button type="button" id="cancel-edit" class="btn-block hidden" style="margin-top:10px;">Cancelar Edição</button>
            </form>

            <div class="posts-list">
                <h3>Notícias Publicadas</h3>
                <div id="admin-posts-container">
                    </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, getDocs, getDoc, doc, updateDoc, deleteDoc, query, orderBy, onSnapshot 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // CONFIGURAÇÃO
        const firebaseConfig = {
            apiKey: "AIzaSyDjuRApif2O4TgX2mAycKEcXULCnFSapbQ",
            authDomain: "mateuscalixto-b8d30.firebaseapp.com",
            projectId: "mateuscalixto-b8d30",
            storageBucket: "mateuscalixto-b8d30.firebasestorage.app",
            messagingSenderId: "1028342828902",
            appId: "1:1028342828902:web:6d283c8280e7c8aa5542a7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- PROTEÇÃO DE ROTA (VERIFICAÇÃO DE ADM) ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "usuarios", user.uid));
                if (userDoc.exists() && userDoc.data().role === "admin") {
                    // É admin, remove o overlay e carrega a página
                    document.getElementById('loading-overlay').classList.add('hidden');
                } else {
                    alert("Acesso negado. Apenas administradores podem acessar esta página.");
                    window.location.href = "index.html";
                }
            } else {
                // Não logado
                window.location.href = "index.html";
            }
        });

        // --- CRUD DE NOTÍCIAS ---

        const postForm = document.getElementById('post-form');
        const postsContainer = document.getElementById('admin-posts-container');

        // Salvar ou Atualizar Notícia
        postForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('edit-id').value;
            const postData = {
                titulo: document.getElementById('titulo').value,
                resumo: document.getElementById('resumo').value,
                imagem: document.getElementById('imagem').value,
                conteudo: document.getElementById('conteudo').value,
                data: new Date()
            };

            try {
                if (id) {
                    await updateDoc(doc(db, "noticias", id), postData);
                    alert("Notícia atualizada!");
                } else {
                    await addDoc(collection(db, "noticias"), postData);
                    alert("Notícia publicada com sucesso!");
                }
                resetForm();
            } catch (error) {
                alert("Erro ao salvar: " + error.message);
            }
        });

        // Listar Notícias (Real-time)
        const q = query(collection(db, "noticias"), orderBy("data", "desc"));
        onSnapshot(q, (snapshot) => {
            postsContainer.innerHTML = "";
            snapshot.forEach((docSnap) => {
                const post = docSnap.data();
                const id = docSnap.id;
                
                const div = document.createElement('div');
                div.className = 'post-item';
                div.innerHTML = `
                    <div class="post-info">
                        <h4>${post.titulo}</h4>
                        <small>${post.data.toDate().toLocaleDateString()}</small>
                    </div>
                    <div class="post-actions">
                        <button onclick="editPost('${id}')">Editar</button>
                        <button class="btn-delete" onclick="deletePost('${id}')">Excluir</button>
                    </div>
                `;
                postsContainer.appendChild(div);
            });
        });

        // Funções globais para os botões da lista
        window.editPost = async (id) => {
            const docSnap = await getDoc(doc(db, "noticias", id));
            const data = docSnap.data();
            
            document.getElementById('titulo').value = data.titulo;
            document.getElementById('resumo').value = data.resumo;
            document.getElementById('imagem').value = data.imagem || "";
            document.getElementById('conteudo').value = data.conteudo;
            document.getElementById('edit-id').value = id;
            
            document.getElementById('submit-btn').innerText = "Salvar Alterações";
            document.getElementById('cancel-edit').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.deletePost = async (id) => {
            if (confirm("Deseja realmente excluir esta notícia?")) {
                await deleteDoc(doc(db, "noticias", id));
            }
        };

        function resetForm() {
            postForm.reset();
            document.getElementById('edit-id').value = "";
            document.getElementById('submit-btn').innerText = "Publicar Notícia";
            document.getElementById('cancel-edit').classList.add('hidden');
        }

        document.getElementById('cancel-edit').onclick = resetForm;
    </script>
</body>
</html>
